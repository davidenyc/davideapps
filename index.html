<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Launcher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Davide Apps</p>
        <h1>Apps Davide is currently developing</h1>
        <div class="toolbar">
          <span class="pill">4 live projects</span>
          <span class="pill pill-last-updated">Last updated</span>
        </div>
      </section>

      <section class="grid" id="app-grid"></section>
    </main>

    <script src="./launcher-data.js"></script>
    <script>
      const grid = document.getElementById("app-grid");
      const apps = Array.isArray(window.LAUNCHER_APPS) ? window.LAUNCHER_APPS : [];
      const formatTimestamp = (value) =>
        value
          ? new Date(value).toLocaleString("en-US", {
              month: "short",
              day: "numeric",
              year: "numeric",
              hour: "numeric",
              minute: "2-digit"
            })
          : "";
      const latestAppUpdate = apps
        .map((app) => app.updatedAt)
        .filter(Boolean)
        .sort((a, b) => new Date(b) - new Date(a))[0];

      const lastUpdatedPill = document.querySelector(".pill-last-updated");
      if (lastUpdatedPill && latestAppUpdate) {
        lastUpdatedPill.textContent = `Last updated ${formatTimestamp(latestAppUpdate)}`;
      }

      grid.innerHTML = apps
        .map((app) => {
          const hasUrl = Boolean(app.appUrl);
          const label = app.label || app.name;
          const theme = app.theme || "sky";
          const updatedText = app.updatedAt ? `Last updated ${formatTimestamp(app.updatedAt)}` : "";
          return `
            <article class="card">
              <div class="card-media theme-${theme}">
                <div class="preview-chrome">
                  <span class="preview-dot"></span>
                  <span class="preview-dot"></span>
                  <span class="preview-dot"></span>
                  <span class="preview-url">${app.appUrl || app.name}</span>
                </div>
                <div class="preview-surface">
                  ${
                    hasUrl
                      ? `<iframe class="live-preview" src="${app.appUrl}" title="${app.name} live preview" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>`
                      : ` <div class="card-mark">${label}</div>
                          <div class="preview-title">${app.name}</div>
                          <div class="preview-lines">
                            <span></span>
                            <span></span>
                            <span></span>
                          </div>`
                  }
                  <div class="preview-overlay"></div>
                  <div class="card-mark card-mark-floating">${label}</div>
                  <div class="card-glow"></div>
                </div>
              </div>
              <div class="card-body">
                <div class="card-top">
                  <h2 class="card-title">${app.name}</h2>
                  <span class="card-status">${app.status || (hasUrl ? "Ready" : "Pending")}</span>
                </div>
                <p class="card-copy">${app.summary}</p>
                <p class="card-meta">${updatedText}</p>
                <div class="card-actions">
                  ${
                    hasUrl
                      ? `<a class="btn btn-primary" href="${app.appUrl}" target="_blank" rel="noreferrer">Open app</a>`
                      : `<span class="btn btn-disabled">Add deployed URL</span>`
                  }
                </div>
              </div>
            </article>
          `;
        })
        .join("");
    </script>
  </body>
</html>
