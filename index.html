<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Launcher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Davide Apps</p>
        <h1>Apps Davide is currently developing</h1>
        <div class="toolbar">
          <span class="pill pill-live-count">5 live projects</span>
          <span class="pill pill-last-updated">Latest repo update</span>
          <span class="pill pill-subtle">Showing latest repo change for each app</span>
        </div>
      </section>

      <section class="grid" id="app-grid"></section>
    </main>

    <script src="./launcher-data.js"></script>
    <script>
      const grid = document.getElementById("app-grid");
      const baseApps = Array.isArray(window.LAUNCHER_APPS) ? window.LAUNCHER_APPS : [];
      const lastUpdatedPill = document.querySelector(".pill-last-updated");
      const liveCountPill = document.querySelector(".pill-live-count");
      const subtlePill = document.querySelector(".pill-subtle");
      let appState = baseApps.map((app) => ({ ...app }));

      const formatTimestamp = (value) =>
        value
          ? new Date(value).toLocaleString("en-US", {
              month: "short",
              day: "numeric",
              year: "numeric",
              hour: "numeric",
              minute: "2-digit"
            })
          : "";

      function getFeedbackUrl(app) {
        return null;
      }

      function updateSummaryPills(items) {
        const latestAppUpdate = items
          .map((app) => app.updatedAt)
          .filter(Boolean)
          .sort((a, b) => new Date(b) - new Date(a))[0];

        if (lastUpdatedPill) {
          lastUpdatedPill.textContent = latestAppUpdate
            ? `Latest repo update ${formatTimestamp(latestAppUpdate)}`
            : "Latest repo update unavailable";
        }

        if (liveCountPill) {
          liveCountPill.textContent = `${items.filter((app) => app.status === "Live").length} live projects`;
        }

        if (subtlePill) {
          subtlePill.textContent = "Showing latest repo change for each app";
        }
      }

      function renderAppGrid(items) {
        grid.innerHTML = items
          .map((app) => {
            const hasUrl = Boolean(app.appUrl);
            const label = app.label || app.name;
            const theme = app.theme || "sky";
            const updatedText = app.updatedAt
              ? `Repo updated ${formatTimestamp(app.updatedAt)}`
              : app.githubRepo
                ? "Repo update unavailable"
                : "Repo update unavailable";
            const feedbackUrl = getFeedbackUrl(app);

            return `
              <article class="card">
                <div class="card-media theme-${theme} app-${app.slug}">
                  <div class="preview-surface">
                    ${
                      hasUrl
                        ? `<iframe class="live-preview" src="${app.appUrl}" title="${app.name} live preview" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>`
                        : `<div class="card-mark">${label}</div>
                           <div class="preview-title">${app.name}</div>
                           <div class="preview-lines">
                             <span></span>
                             <span></span>
                             <span></span>
                           </div>`
                    }
                  </div>
                </div>
                <div class="card-body">
                <div class="card-top">
                  <h2 class="card-title">${app.name}</h2>
                  <span class="card-status">${app.status || (hasUrl ? "Ready" : "Pending")}</span>
                </div>
                <p class="card-copy">${app.summary}</p>
                <p class="card-meta">${updatedText}</p>
                <div class="card-actions">
                  ${
                    hasUrl
                        ? `<a class="btn btn-primary" href="${app.appUrl}" target="_blank" rel="noreferrer">Open app</a>`
                        : `<span class="btn btn-disabled">Add deployed URL</span>`
                  }
                    ${
                      feedbackUrl
                        ? `<a class="btn btn-ghost" href="${feedbackUrl}" target="_blank" rel="noreferrer">Leave feedback</a>`
                        : ""
                    }
                  </div>
                </div>
              </article>
            `;
          })
          .join("");
      }

      renderAppGrid(appState);
      updateSummaryPills(appState);
    </script>
  </body>
</html>
